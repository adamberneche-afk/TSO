name: Issue Export

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Export issues
      uses: some/action-to-export-issues@v1

    - name: Upload export
      uses: actions/upload-artifact@v3
      with:
        name: exported-issues
        path: ./exported-issues/*.json

    - name: Notify completion
      run: echo 'Export complete.'