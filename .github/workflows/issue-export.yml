name: Export GitHub Issues Weekly

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  export-issues:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Diagnose API access
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 Diagnostic Information:"
          echo "Repository: ${{ github.repository }}"
          echo "Token present: $([ -z '${{ secrets.GITHUB_TOKEN }}' ] && echo 'NO' || echo 'YES')"
          
          # Test API call with diagnostic output
          curl -i -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues?per_page=1"
