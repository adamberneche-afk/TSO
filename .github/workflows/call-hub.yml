name: Ping CTO Hub
on:
  schedule:
    - cron: '*/30 * * * *'
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  call-central-brain:
    runs-on: ubuntu-latest
    steps:
      - name: Send Payload to Hub
        run: |
          curl -X POST https://your-hub-name.vercel.app/api/autonomous_agent           -H "Content-Type: application/json"           -d '{
            "owner": "${{ github.repository_owner }}",
            "repo": "${{ github.event.repository.name }}",
            "mode": "${{ github.event.schedule == '''0 0 * * 0''' && '''refactor''' || '''debug''' }}"
          }' 