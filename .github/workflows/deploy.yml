name: Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tais_frontend
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: tais_frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Add Environment Variables
        run: |
          vercel env add VITE_REGISTRY_URL https://tso.onrender.com --token=${{ secrets.VERCEL_TOKEN }} --yes || true
          vercel env add VITE_RPC_URL https://cloudflare-eth.com --token=${{ secrets.VERCEL_TOKEN }} --yes || true
          vercel env add VITE_GENESIS_CONTRACT 0x11B3EfbF04F0bA505F380aC20444B6952970AdA6 --token=${{ secrets.VERCEL_TOKEN }} --yes || true
