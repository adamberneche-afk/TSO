name: Daily Health Report

on:
  schedule:
    - cron: '0 7 * * *'  # Runs daily at 7:00 AM UTC (adjust for your timezone)
  workflow_dispatch:  # Allows manual triggers

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      issues: read  # Only needs read access to issues
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}  # Ensures we check out the correct repo
          ref: ${{ github.ref }}                # Checks out the same branch/tag/ref
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: |
          npm ci
          npx prisma generate  # Ensures Prisma types are fresh
          
      - name: Run Health Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Auto‑provided by GitHub
        run: |
          node scripts/health-analyzer.js > daily_issues_report.md
          
      - name: Save Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-issues-report
          path: daily_issues_report.md
          retention-days: 30  # Keep reports for 30 days (adjust as needed)
