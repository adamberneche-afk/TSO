name: Daily Health Report

on:
  schedule:
    - cron: '0 7 * * *'  # Runs daily at 7 AM UTC (adjust for your timezone)
  workflow_dispatch:  # Allows manual triggers

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      issues: read  # Critical: only needs read access to issues
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: |
          npm ci
          npx prisma generate  # Ensures Prisma types are fresh
          
      - name: Run Health Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Auto-provided by GitHub
        run: |
          node scripts/health-analyzer.js > health-report.md
          
      - name: Post Report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('health-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: ${{ github.event.inputs.issue_number || 1 }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `
## 🤖 DAILY HEALTH REPORT - $(date)
*Auto-generated by TSO Health System*

${report}

---
*This report updates daily. To trigger manually: 
\`gh workflow run health-report.yml -f issue_number=<issue_num>\`*
              `
            });
