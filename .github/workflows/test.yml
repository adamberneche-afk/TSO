name: Test and Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tais_registry_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: |
        cd packages/registry
        npm ci

    - name: Generate Prisma Client
      run: |
        cd packages/registry
        npx prisma generate

    - name: Run database migrations
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tais_registry_test
      run: |
        cd packages/registry
        npx prisma migrate deploy

    - name: Run tests
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tais_registry_test
        TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tais_registry_test
        JWT_SECRET: test-secret-key
        NODE_ENV: test
      run: |
        cd packages/registry
        npm test -- --coverage

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./packages/registry/coverage/lcov.info
        flags: unittests
        name: codecov-umbrella

   build:
     runs-on: ubuntu-latest
     needs: test
     
     steps:
     - uses: actions/checkout@v4
       with:
         token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: |
        cd packages/registry
        npm ci

    - name: Generate Prisma Client
      run: |
        cd packages/registry
        npx prisma generate

    - name: Build application
      run: |
        cd packages/registry
        npm run build

    - name: Verify build artifacts
      run: |
        cd packages/registry
        test -f dist/index.js
        test -d dist/routes
        test -d dist/services

    lint:
      runs-on: ubuntu-latest
      
      steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
    
     - name: Setup Node.js
       uses: actions/setup-node@v3
       with:
         node-version: '22'
         cache: 'npm'

    - name: Install dependencies
      run: |
        cd packages/registry
        npm ci

    - name: Run linter
      run: |
        cd packages/registry
        npm run lint