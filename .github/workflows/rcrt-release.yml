name: Build RCRT All Platforms

on:
  push:
    tags:
      - 'rcrt-v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release -p rcrt-standalone
      - run: cp target/release/rcrt-standalone ./RCRT-linux-x64
      - uses: actions/upload-artifact@v4
        with:
          name: RCRT-linux-x64
          path: RCRT-linux-x64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release -p rcrt-standalone
      - run: copy target\release\rcrt-standalone.exe RCRT.exe
      - uses: actions/upload-artifact@v4
        with:
          name: RCRT-windows
          path: RCRT.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release -p rcrt-standalone
      - run: cp target/release/rcrt-standalone ./RCRT-mac
      - uses: actions/upload-artifact@v4
        with:
          name: RCRT-mac
          path: RCRT-mac
