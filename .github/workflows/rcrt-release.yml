name: Build and Release RCRT Standalone

on:
  push:
    tags:
      - 'rcrt-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: false
        default: ''

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release -p rcrt-standalone
      - name: Package
        run: |
          cp target/release/rcrt-standalone ./RCRT-linux-x64
          chmod +x ./RCRT-linux-x64
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: RCRT-linux-x64
          path: RCRT-linux-x64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release -p rcrt-standalone
      - name: Package
        run: Copy-Item target\release\rcrt-standalone.exe RCRT.exe
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: RCRT.exe
          path: RCRT.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release -p rcrt-standalone
      - name: Package
        run: |
          cp target/release/rcrt-standalone ./RCRT-mac
          chmod +x ./RCRT-mac
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: RCRT-mac
          path: RCRT-mac

  release:
    needs: [build-linux, build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download Linux
        uses: actions/download-artifact@v4
        with:
          name: RCRT-linux-x64
      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: RCRT.exe
      - name: Download Mac
        uses: actions/download-artifact@v4
        with:
          name: RCRT-mac
      - name: Create Release
        if: github.event.inputs.tag != '' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            RCRT-linux-x64
            RCRT.exe
            RCRT-mac
          tag: ${{ github.event.inputs.tag || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
