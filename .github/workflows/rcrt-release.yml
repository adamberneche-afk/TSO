name: Build and Release RCRT Standalone

on:
  push:
    tags:
      - 'rcrt-v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: RCRT-linux-x64
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: RCRT.exe
          - runner: macos-latest
            target: x86_64-apple-darwin
            binary: RCRT-mac
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p rcrt-standalone
      
      - name: Rename binary
        run: |
          ${{ matrix.runner == 'windows-latest' && 'copy' || 'cp' }} target/${{ matrix.target }}/release/rcrt-standalone.exe ./${{ matrix.binary }}
      
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          files: ${{ matrix.binary }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
