name: Build RCRT All Platforms

on:
  push:
    tags:
      - 'rcrt-v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build
        run: |
          cargo build --release -p rcrt-standalone
          cp target/release/rcrt-standalone ./RCRT-linux-x64
          chmod +x ./RCRT-linux-x64
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: RCRT-binaries
          path: |
            RCRT-linux-x64
