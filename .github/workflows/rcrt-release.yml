name: Build and Release RCRT Standalone

on:
  push:
    tags:
      - 'rcrt-v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Linux
        run: cargo build --release -p rcrt-standalone

      - name: Package Linux
        run: |
          cp target/release/rcrt-standalone ./RCRT-linux-x64
          chmod +x ./RCRT-linux-x64

      - name: Upload Linux Release
        uses: softprops/action-gh-release@v1
        with:
          files: RCRT-linux-x64
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
