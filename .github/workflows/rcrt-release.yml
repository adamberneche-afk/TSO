name: Build and Release RCRT Standalone

on:
  push:
    tags:
      - 'rcrt-v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: RCRT-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: RCRT.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: RCRT-mac

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add cross compiler
        if: matrix.os != 'windows-latest'
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p rcrt-standalone

      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/rcrt-standalone ./${{ matrix.binary }}
          ${{ matrix.os == 'ubuntu-latest' && 'chmod +x ./${{ matrix.binary }}' || '' }}

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.binary }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
