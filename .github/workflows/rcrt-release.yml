name: Build and Release RCRT Standalone

on:
  push:
    tags:
      - 'rcrt-v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: RCRT-linux-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: RCRT-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: RCRT-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: RCRT-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: |
          cargo build --release -p rcrt-standalone

      - name: Package
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/release/rcrt-standalone.exe ./${{ matrix.artifact }}
          else
            cp target/release/rcrt-standalone ./${{ matrix.artifact }}
            chmod +x ./${{ matrix.artifact }}
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
