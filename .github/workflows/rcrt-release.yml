name: Build and Release RCRT Standalone

on:
  push:
    tags:
      - 'rcrt-v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build for Linux
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu -p rcrt-standalone
          cp target/x86_64-unknown-linux-gnu/release/rcrt-standalone ./RCRT-linux-x64
          chmod +x ./RCRT-linux-x64
      
      - name: Upload Linux
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          files: RCRT-linux-x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
