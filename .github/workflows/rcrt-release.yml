name: Build and Release RCRT Standalone

on:
  push:
    tags:
      - 'rcrt-v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: RCRT-linux-x64
          - runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            name: RCRT.exe
          - runs-on: macos-latest
            target: x86_64-apple-darwin
            name: RCRT-mac
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p rcrt-standalone
      
      - name: Package
        shell: bash
        run: |
          if [ "${{ matrix.runs-on }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/rcrt-standalone.exe ./${{ matrix.name }}
          else
            cp target/${{ matrix.target }}/release/rcrt-standalone ./${{ matrix.name }}
            chmod +x ./${{ matrix.name }}
          fi
      
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ./${{ matrix.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
