name: Build RCRT Standalone

on:
  push:
    tags:
      - 'rcrt-v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu -p rcrt-standalone
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RCRT-binary
          path: target/x86_64-unknown-linux-gnu/release/rcrt-standalone
